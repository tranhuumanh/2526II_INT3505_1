openapi: 3.0.3
info:
  title: Book Management API
  description: API quản lý sách đơn giản
  version: 1.0.0
servers:
  - url: http://localhost:5000
tags:
  - name: Books
    description: Các thao tác liên quan đến sách
paths:
  /books:
    get:
      summary: Lấy danh sách sách
      responses:
        '200':
          description: Danh sách sách
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'
    post:
      summary: Tạo sách mới
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookInput'
      responses:
        '201':
          description: Tạo thành công
  /books/{id}:
    get:
      summary: Lấy chi tiết sách
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Thông tin sách
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
components:
  schemas:
    Book:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        author:
          type: string
        publishedYear:
          type: integer
    BookInput:
      type: object
      required:
        - title
        - author
      properties:
        title:
          type: string
        author:
          type: string
        publishedYear:
          type: integer